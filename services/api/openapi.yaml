openapi: 3.1.0
info:
  title: Aria NestJS API
  version: 0.7.0
  description: Public project API with multimodal ingestion, acoustic analysis, musical understanding, and correctable input interpretation.
servers:
  - url: http://localhost:8010
paths:
  /health:
    get:
      summary: Report API health
      responses:
        '200':
          description: API process is available.
  /songs:
    post:
      summary: Create a draft project from a brief and optional audio/video input
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SongFields'
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/SongFields'
                - type: object
                  properties:
                    media:
                      type: string
                      format: binary
                    media_purpose:
                      type: string
                      enum: [mixture, voice]
      responses:
        '201':
          description: Project created as a text draft or with an analyzed input; media responses include the public manifest and active interpretation and normally await review while the baseline is uncalibrated.
        '400':
          $ref: '#/components/responses/IngestionError'
        '413':
          $ref: '#/components/responses/IngestionError'
  /songs/{id}:
    get:
      summary: Get the persisted project and artifact state
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200': { description: Current persisted project state }
        '404': { description: Project not found }
  /projects:
    post:
      summary: Create a project with a structured brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SongFields'
      responses:
        '201':
          description: Canonical project record with brief metadata
        '400':
          $ref: '#/components/responses/IngestionError'
  /projects/{projectId}:
    get:
      summary: Get a project and its artifact metadata
      parameters:
        - $ref: '#/components/parameters/ArtifactProjectId'
      responses:
        '200': { description: Project with artifacts ordered by creation time }
        '404': { description: Project not found }
  /projects/{projectId}/artifacts/upload-url:
    post:
      summary: Create a pending artifact version and signed PUT URL
      parameters:
        - $ref: '#/components/parameters/ArtifactProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArtifactUpload'
      responses:
        '201':
          description: Pending artifact metadata and short-lived signed upload contract
        '400': { description: Invalid artifact fields or signed URL lifetime }
        '404': { description: Project not found }
  /projects/{projectId}/artifacts/{artifactId}/download-url:
    get:
      summary: Create a signed GET URL for an available artifact
      parameters:
        - $ref: '#/components/parameters/ArtifactProjectId'
        - name: artifactId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Short-lived signed download contract
        '404': { description: Available artifact not found }
  /projects/{projectId}/inputs/{inputId}/interpretation:
    get:
      summary: Read the active input interpretation and correction choices
      parameters:
        - $ref: '#/components/parameters/ArtifactProjectId'
        - $ref: '#/components/parameters/InputId'
      responses:
        '200':
          description: Active interpretation, ranked source candidates, and allowed correction values
        '404': { description: Input interpretation not found }
    patch:
      summary: Confirm or correct an inferred input interpretation
      parameters:
        - $ref: '#/components/parameters/ArtifactProjectId'
        - $ref: '#/components/parameters/InputId'
        - name: x-editor-id
          in: header
          schema: { type: string }
          description: Local actor label recorded in the audit trail; not an authentication credential.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InterpretationPatch' }
      responses:
        '200': { description: New immutable active interpretation version }
        '400': { description: Invalid taxonomy value }
        '404': { description: Input interpretation not found }
        '409': { description: baseVersion is stale; refresh before retrying }
  /projects/{projectId}/inputs/{inputId}/interpretation/history:
    get:
      summary: List immutable interpretation versions and edit summaries
      parameters:
        - $ref: '#/components/parameters/ArtifactProjectId'
        - $ref: '#/components/parameters/InputId'
      responses:
        '200': { description: Ordered interpretation history }
  /projects/{projectId}/audio-understanding:
    post:
      summary: Start fused musical understanding generation for an approved input interpretation
      parameters:
        - $ref: '#/components/parameters/ArtifactProjectId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                inputId: { type: string, format: uuid }
                force: { type: boolean, default: false }
      responses:
        '202': { description: WorkflowRun accepted for async generation }
        '200': { description: Existing understanding reused for current interpretation }
        '409': { description: Interpretation not approved }
        '404': { description: Project or input not found }
    get:
      summary: Read the active AudioUnderstanding summary for the project primary input
      parameters:
        - $ref: '#/components/parameters/ArtifactProjectId'
      responses:
        '200': { description: AudioUnderstanding summary with optional download URL }
        '404': { description: Audio understanding not found }
  /projects/{projectId}/audio-understanding/{artifactId}:
    get:
      summary: Read a specific AudioUnderstanding artifact version summary
      parameters:
        - $ref: '#/components/parameters/ArtifactProjectId'
        - name: artifactId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: AudioUnderstanding summary with optional download URL }
        '404': { description: Audio understanding not found }
  /projects/{projectId}/workflow-runs/{runId}:
    get:
      summary: Poll a minimal workflow run for async musical understanding
      parameters:
        - $ref: '#/components/parameters/ArtifactProjectId'
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: WorkflowRun status and progress }
        '404': { description: Workflow run not found }
components:
  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ArtifactProjectId:
      name: projectId
      in: path
      required: true
      schema: { type: string, format: uuid }
    InputId:
      name: inputId
      in: path
      required: true
      description: Input-manifest artifact ID
      schema: { type: string, format: uuid }
  schemas:
    CreateArtifactUpload:
      type: object
      required: [artifactType, namespace, retentionClass, logicalName, fileName, contentType]
      properties:
        artifactType:
          type: string
          enum: [INPUT_MANIFEST, REQUIREMENTS, CREATIVE_BRIEF, SONG_BLUEPRINT, LYRICS, SYMBOLIC_SCORE, ARRANGEMENT, PERFORMANCE, STEM, MIX, MASTER, REVIEW, EXPORT, SOURCE_MEDIA, NORMALIZED_AUDIO, ANALYSIS, AUDIO_UNDERSTANDING, PREVIEW]
        namespace:
          type: string
          enum: [ORIGINALS, NORMALIZED_AUDIO, ANALYSIS, REQUIREMENTS, CREATIVE_DIRECTION, BLUEPRINTS, LYRICS, SCORES, ARRANGEMENTS, PERFORMANCES, STEMS, MIXES, MASTERS, REVIEWS, PREVIEWS, EXPORTS]
        retentionClass: { type: string, enum: [ORIGINAL, INTERMEDIATE, PREVIEW, FINAL] }
        logicalName: { type: string, minLength: 1 }
        fileName: { type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9._-]*$' }
        contentType: { type: string, minLength: 1 }
        expiresInSeconds: { type: integer, minimum: 60, maximum: 3600, default: 900 }
        expiresAt:
          type: string
          format: date-time
          description: Optional lifecycle expiry; accepted only with PREVIEW retention.
    SongFields:
      type: object
      properties:
        title: { type: string }
        idea: { type: string, minLength: 3, maxLength: 10000 }
        prompt: { type: string, minLength: 3, maxLength: 10000 }
        lyrics: { type: string, maxLength: 50000 }
        mood: { type: string, enum: [happy, sad, energetic, chill, romantic, epic, mysterious] }
        genre: { type: string, enum: [pop, rock, hip-hop, r-and-b, electronic, folk, jazz, country] }
        length: { type: string, enum: [short, medium, long] }
        vocal_style: { type: string, enum: [male, female, duet, instrumental] }
        language: { type: string, default: en }
        audience: { type: string, maxLength: 500 }
        deliverables:
          type: array
          maxItems: 10
          items: { type: string, maxLength: 100 }
    InterpretationPatch:
      type: object
      required: [baseVersion]
      properties:
        baseVersion: { type: integer, minimum: 1 }
        sourceType:
          type: string
          enum: [speech, singing, humming, solo_instrument, mixed_music, environmental_sound, beatboxing, unknown]
        musicScope: { type: string, enum: [full_song, fragment, loop, unknown] }
        intendedUses:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [transcribe_lyrics, extract_melody, use_as_vocal_performance, use_as_instrument_performance, use_as_style_reference, continue_recording, ignore]
        note: { type: string, maxLength: 500 }
    Error:
      type: object
      required: [statusCode, error, code, message]
      properties:
        statusCode: { type: integer }
        error: { type: string }
        code:
          type: string
          examples: [NO_AUDIO_STREAM, SILENCE_ONLY, UPLOAD_TOO_LARGE]
        message: { type: string }
  responses:
    IngestionError:
      description: Upload or media validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
