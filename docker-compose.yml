services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria
      POSTGRES_DB: aria
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  agent:
    build:
      context: ./services/agent
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aria:aria@postgres:5432/aria
      REDIS_URL: redis://redis:6379
      LYRICS_SERVICE_URL: http://lyrics:8001
      COMPOSITION_SERVICE_URL: http://composition:8002
      MIXING_SERVICE_URL: http://mixing:8003
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - postgres
      - redis
      - lyrics
      - composition
      - mixing
    volumes:
      - ./services/agent:/app
      - song_outputs:/app/outputs

  lyrics:
    build:
      context: ./services/lyrics
    ports:
      - "8001:8001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  composition:
    build:
      context: ./services/composition
    ports:
      - "8002:8002"
    volumes:
      - song_outputs:/app/outputs

  mixing:
    build:
      context: ./services/mixing
    ports:
      - "8003:8003"
    volumes:
      - song_outputs:/app/outputs

volumes:
  postgres_data:
  song_outputs:
