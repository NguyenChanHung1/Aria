services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria
      POSTGRES_DB: aria
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria -d aria"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aria-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aria-minio-development}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
      - ./infrastructure/minio/certs:/root/.minio/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing local/$${OBJECT_STORAGE_BUCKET} &&
        mc anonymous set none local/$${OBJECT_STORAGE_BUCKET}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aria-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aria-minio-development}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-aria-artifacts}

  api:
    build:
      context: ./services/api
    ports:
      - "8010:8010"
    environment:
      API_PORT: 8010
      DATABASE_URL: postgresql://aria:aria@postgres:5432/aria
      MEDIA_STORAGE_DIR: /app/outputs
      MEDIA_TEMP_DIR: /app/outputs/.tmp
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-262144000}
      MAX_MEDIA_DURATION_SECONDS: ${MAX_MEDIA_DURATION_SECONDS:-1800}
      MAX_MEDIA_STREAMS: ${MAX_MEDIA_STREAMS:-16}
      MEDIA_PROCESS_TIMEOUT_MS: ${MEDIA_PROCESS_TIMEOUT_MS:-120000}
      MEDIA_SILENCE_THRESHOLD_DB: ${MEDIA_SILENCE_THRESHOLD_DB:--60}
      MEDIA_CLIPPING_WARNING_DB: ${MEDIA_CLIPPING_WARNING_DB:--0.1}
      MEDIA_MAX_CLIPPING_RATIO: ${MEDIA_MAX_CLIPPING_RATIO:-0.01}
      WEB_ORIGIN: http://localhost:3000
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: ${OBJECT_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-aria-artifacts}
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-aria-minio}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aria-minio-development}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      OBJECT_STORAGE_SIGNED_URL_TTL_SECONDS: ${OBJECT_STORAGE_SIGNED_URL_TTL_SECONDS:-900}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - song_outputs:/app/outputs

volumes:
  postgres_data:
  minio_data:
  song_outputs:
